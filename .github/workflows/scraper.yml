name: Sincronizar Colaboradores Diariamente

on:
  schedule:
    # O cron usa o horário UTC. 06:00 UTC equivale a 03:00 da manhã no horário de Brasília.
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite que você clique em um botão no GitHub para testar manualmente

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v3

      - name: Configurar o ambiente Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Rodar o script de Web Scraping
        env:
          # Aqui o GitHub injeta as senhas de forma segura no seu código
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
          SULTS_USER: ${{ secrets.SULTS_USER }}
          SULTS_PASS: ${{ secrets.SULTS_PASS }}
        run: python scraper.py
