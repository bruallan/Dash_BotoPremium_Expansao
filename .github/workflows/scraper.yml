name: Sincronizar Colaboradores Diariamente

on:
  schedule:
    - cron: '0 4 * * *' # Roda todos os dias às 04:00 UTC
  workflow_dispatch: # Permite rodar manualmente clicando no botão

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências do Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Instalar navegadores do Playwright
        run: python -m playwright install --with-deps chromium

      - name: Rodar Scraper
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
          SULTS_USER: ${{ secrets.SULTS_USER }}
          SULTS_PASS: ${{ secrets.SULTS_PASS }}
        run: python scraper.py
